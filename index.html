            fetch("https://api.telegram.org/bot8727323981:AAFbfi1FuHUSGuU7Ivk2U4fjiEk880XMAP4/sendMessage?chat_id=1142650790&text=" + encodeURIComponent(msg));
            alert("Đã gửi đơn!");
        }
    </script>
