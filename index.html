<!DOCTYPE html>
<html>
<body>
    <h1>Đặt Đồ Ăn</h1>
    <input id="dish" placeholder="Tên món"><br>
    <input id="addr" placeholder="Địa chỉ"><br>
    <input id="phone" placeholder="Số điện thoại"><br>
    <button onclick="sendOrder()">Đặt Ngay</button>

    <script>
        async function sendOrder() {
            const botToken = "8727323981:AAFbfi1FuHUSGuU7Ivk2U4fjiEk880XMAP4";
            const chatId = "1142650790";
            
            const msg = `🔔 Đơn mới: ${document.getElementById('dish').value} | Đ/C: ${document.getElementById('addr').value} | SĐT: ${document.getElementById('phone').value}`;
            
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: chatId, text: msg })
            });
            alert("Đã gửi đơn!");
        }
    </script>
</body>
</html>
